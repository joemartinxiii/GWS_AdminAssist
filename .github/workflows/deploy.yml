name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: workspace-admin
  SCAN_JOB: workspace-admin-scan
  REPO: workspace-admin-repo
  # secrets can't be referenced in `if:` directly, so derive a boolean here.
  HAS_WIF: ${{ secrets.GCP_WIF_PROVIDER != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Type-check and security tests
        run: |
          npm run type-check
          npm run check:scopes
          npm run test:security

      - name: Lint (informational)
        continue-on-error: true
        run: npm run lint

      # Keyless auth via Workload Identity Federation (preferred). Works even
      # when org policy blocks SA key creation (iam.disableServiceAccountKeyCreation),
      # which is the same constraint that made runtime DWD keyless. Set the
      # GCP_WIF_PROVIDER + GCP_DEPLOY_SA secrets via scripts/setup-github-ci.sh.
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: env.HAS_WIF == 'true'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      # Fallback for forks whose org permits SA keys: set GCP_SA_KEY instead.
      - name: Authenticate to Google Cloud (service-account key fallback)
        if: env.HAS_WIF != 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure project and Docker
        run: |
          gcloud config set project "${{ env.PROJECT_ID }}" --quiet
          gcloud artifacts repositories create "${{ env.REPO }}" \
            --repository-format=docker \
            --location="${{ env.REGION }}" \
            --quiet 2>/dev/null || true
          gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}"
          docker build --platform linux/amd64 -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${GITHUB_SHA}"
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE" \
            --platform managed \
            --region "${{ env.REGION }}" \
            --memory 1Gi \
            --cpu 1 \
            --cpu-boost \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 300 \
            --service-account "workspace-admin-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars "NODE_ENV=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},SERVICE_ACCOUNT_EMAIL=workspace-admin-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com,SCAN_BUCKET=${{ env.PROJECT_ID }}-workspace-admin-scans,SCAN_JOB_NAME=${{ env.SCAN_JOB }},SCAN_REGION=${{ env.REGION }}" \
            --set-secrets "GOOGLE_CLIENT_ID=oauth-client-id:latest,GOOGLE_CLIENT_SECRET=oauth-client-secret:latest,GOOGLE_REDIRECT_URI=oauth-redirect-uri:latest,JWT_SECRET=app-jwt-secret:latest,WORKSPACE_DOMAIN=app-workspace-domain:latest,GWS_ALLOWED_DOMAINS=app-allowed-domains:latest" \
            --allow-unauthenticated \
            --no-invoker-iam-check \
            --quiet

      - name: Update CORS and OAuth redirect URI
        run: |
          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" --region "${{ env.REGION }}" --format='value(status.url)')
          REDIRECT_URI="${SERVICE_URL}/api/auth/callback"
          gcloud run services update "${{ env.SERVICE_NAME }}" \
            --region "${{ env.REGION }}" \
            --set-env-vars "NODE_ENV=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},SERVICE_ACCOUNT_EMAIL=workspace-admin-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com,CORS_ORIGIN=${SERVICE_URL},SCAN_BUCKET=${{ env.PROJECT_ID }}-workspace-admin-scans,SCAN_JOB_NAME=${{ env.SCAN_JOB }},SCAN_REGION=${{ env.REGION }}" \
            --no-invoker-iam-check \
            --quiet
          echo -n "$REDIRECT_URI" | gcloud secrets versions add oauth-redirect-uri --data-file=- --quiet
          echo "Service URL: $SERVICE_URL"
          echo "Redirect URI: $REDIRECT_URI"
          echo "Ensure this redirect URI is registered on your OAuth Web client if the URL changed."

      - name: Configure external-sharing scan (bucket + Cloud Run Job)
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${GITHUB_SHA}"
          SCAN_BUCKET="${{ env.PROJECT_ID }}-workspace-admin-scans"
          RUNTIME_SA="workspace-admin-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud storage buckets describe "gs://${SCAN_BUCKET}" &>/dev/null \
            || gcloud storage buckets create "gs://${SCAN_BUCKET}" --project="${{ env.PROJECT_ID }}" --location="${{ env.REGION }}" --uniform-bucket-level-access --quiet
          gcloud storage buckets add-iam-policy-binding "gs://${SCAN_BUCKET}" \
            --member="serviceAccount:${RUNTIME_SA}" --role="roles/storage.objectAdmin" --quiet || true
          gcloud projects add-iam-policy-binding "${{ env.PROJECT_ID }}" \
            --member="serviceAccount:${RUNTIME_SA}" --role="roles/run.developer" --quiet || true
          gcloud run jobs deploy "${{ env.SCAN_JOB }}" \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --service-account "${RUNTIME_SA}" \
            --command node \
            --args backend/dist/jobs/externalScan.js \
            --max-retries 1 \
            --task-timeout 3600 \
            --memory 1Gi \
            --cpu 1 \
            --set-env-vars "NODE_ENV=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},SERVICE_ACCOUNT_EMAIL=${RUNTIME_SA},SCAN_BUCKET=${SCAN_BUCKET},SCAN_USER_CONCURRENCY=15" \
            --set-secrets "WORKSPACE_DOMAIN=app-workspace-domain:latest,GWS_ALLOWED_DOMAINS=app-allowed-domains:latest" \
            --quiet
