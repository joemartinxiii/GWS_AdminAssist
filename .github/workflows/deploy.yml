name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: workspace-admin
  REPO: workspace-admin-repo
  # secrets can't be referenced in `if:` directly, so derive a boolean here.
  HAS_WIF: ${{ secrets.GCP_WIF_PROVIDER != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Type-check, scopes, security tests
        run: |
          npm run type-check
          npm run type-check:frontend
          npm run check:scopes
          npm run test:security

      - name: Lint (informational)
        continue-on-error: true
        run: npm run lint:ci

      # Keyless auth via Workload Identity Federation (preferred).
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        if: env.HAS_WIF == 'true'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      # Fallback for forks whose org permits SA keys: set GCP_SA_KEY instead.
      - name: Authenticate to Google Cloud (service-account key fallback)
        if: env.HAS_WIF != 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      # Keep the enabled API set in sync. scripts/lib/scopes.sh is the single source of truth.
      - name: Enable required Google APIs
        run: |
          # shellcheck source=scripts/lib/scopes.sh
          source scripts/lib/scopes.sh
          gcloud services enable "${GCP_APIS[@]}" --project="${{ env.PROJECT_ID }}" --quiet 2>/dev/null \
            || echo "NOTE: could not enable APIs from CI (deploy SA lacks serviceusage.serviceUsageAdmin?). Run scripts/setup-github-ci.sh to grant it. Continuing."

      - name: Configure project and Docker
        run: |
          gcloud config set project "${{ env.PROJECT_ID }}" --quiet
          gcloud artifacts repositories create "${{ env.REPO }}" \
            --repository-format=docker \
            --location="${{ env.REGION }}" \
            --quiet 2>/dev/null || true
          gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}"
          docker build --platform linux/amd64 -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"

      # Shared post-image deploy (service, redirect pin, CORS, scan job, health, DWD hint).
      # Same code path as deploy-cloudshell.sh / deploy.sh after the image exists.
      - name: Deploy Cloud Run service + scan job
        env:
          # Optional: set repo variable SIGNATURE_TEMPLATE_BUCKET for durable signature templates.
          SIGNATURE_TEMPLATE_BUCKET: ${{ vars.SIGNATURE_TEMPLATE_BUCKET }}
          GWS_PROTECTED_USERS: ${{ vars.GWS_PROTECTED_USERS }}
          DWD_ADMIN_EMAIL: ${{ vars.DWD_ADMIN_EMAIL }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${GITHUB_SHA}"
          bash scripts/deploy-from-image.sh "${{ env.PROJECT_ID }}" "${{ env.REGION }}" "$IMAGE"
