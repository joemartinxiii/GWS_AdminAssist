name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: workspace-admin
  REPO: cloud-run-source-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # For Workload Identity (preferred over long-lived keys)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint, type-check, and security tests
        run: |
          npm run lint
          npm run type-check
          npm run test:security
        # npm audit (dev deps) can be addressed with Dependabot + npm audit fix.
        # Consider adding Trivy Docker scan in future.

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}  # Prefer workload_identity_federation for prod
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push to Artifact Registry
        run: |
          # Uses updated Dockerfile (multi-stage)
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:$GITHUB_SHA .
          docker tag us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:$GITHUB_SHA \
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:latest
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:$GITHUB_SHA
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:$GITHUB_SHA \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 1Gi \
            --cpu 1 \
            --cpu-boost \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 300 \
            --service-account=workspace-admin-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "NODE_ENV=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},SERVICE_ACCOUNT_SECRET_NAME=service-account-key" \
            --set-secrets "GOOGLE_CLIENT_ID=oauth-client-id:latest,GOOGLE_CLIENT_SECRET=oauth-client-secret:latest,GOOGLE_REDIRECT_URI=oauth-redirect-uri:latest,JWT_SECRET=app-jwt-secret:latest,WORKSPACE_DOMAIN=app-workspace-domain:latest,GWS_ALLOWED_DOMAINS=app-allowed-domains:latest"

      - name: Update CORS and Redirect URI (post-deploy)
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Service URL: $SERVICE_URL"
          # Update CORS
          gcloud run services update ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --update-env-vars "CORS_ORIGIN=${SERVICE_URL}"
          # Update redirect secret with real URL
          REAL_REDIRECT="${SERVICE_URL}/api/auth/callback"
          echo -n "$REAL_REDIRECT" | gcloud secrets versions add oauth-redirect-uri --data-file=-
          echo "✅ Updated CORS_ORIGIN and oauth-redirect-uri with $REAL_REDIRECT"

      - name: Allow public HTTPS (optional)
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --member=allUsers --role=roles/run.invoker || echo "Public invoker skipped (org policy or already set)."
