# service.yaml - Declarative Cloud Run configuration (gcloud run services replace service.yaml)
# Use after initial deploy or for GitOps. Matches the settings in deploy.sh and DEPLOYMENT.md.
# Secrets use latest version; update versions for pin ning in prod.
# Run: gcloud run services replace service.yaml --region us-central1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: workspace-admin
  annotations:
    run.googleapis.com/ingress: all  # or internal-and-cloud-load-balancing for stricter
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-boost: "true"
    spec:
      serviceAccountName: workspace-admin-sa@${PROJECT_ID}.iam.gserviceaccount.com
      containers:
      - image: us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/workspace-admin:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        - name: GCP_PROJECT_ID
          value: "${PROJECT_ID}"
        - name: SERVICE_ACCOUNT_SECRET_NAME
          value: "service-account-key"
        # Secrets injected via Cloud Run (one per env var). See DEPLOYMENT.md and setup-secrets.sh.
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-client-id
              key: latest
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-client-secret
              key: latest
        - name: GOOGLE_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: oauth-redirect-uri
              key: latest
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-jwt-secret
              key: latest
        - name: WORKSPACE_DOMAIN
          valueFrom:
            secretKeyRef:
              name: app-workspace-domain
              key: latest
        - name: CORS_ORIGIN
          valueFrom:
            secretKeyRef:
              name: app-cors-origin  # Updated post-deploy by deploy.sh
              key: latest
        - name: GWS_ALLOWED_DOMAINS
          valueFrom:
            secretKeyRef:
              name: app-allowed-domains
              key: latest
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        # Health checks implicit via /health endpoint in backend/src/index.ts
