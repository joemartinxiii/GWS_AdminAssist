apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: workspace-admin
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: workspace-admin-sa
      containers:
      - image: gcr.io/PROJECT_ID/workspace-admin:latest
        ports:
        - name: http1
          containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: GCP_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: gcp-config
              key: project-id
        - name: SERVICE_ACCOUNT_SECRET_NAME
          value: "service-account-key"
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-config
              key: client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-config
              key: client-secret
        - name: GOOGLE_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: oauth-config
              key: redirect-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        - name: WORKSPACE_DOMAIN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: workspace-domain
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "1"
            memory: "512Mi"
